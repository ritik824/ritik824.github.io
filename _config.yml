# Basic Site Settings
locale: "en-US"

site_theme: "default"

title: "Ritik Soni | Homepage"
title_separator: "-"
name: "Ritik Soni"
description: "Personal academic website of Ritik Soni, IIT Kanpur"

url: "https://ritik824.github.io"
baseurl: ""

repository: "ritik824/ritik824.github.io"

# Author (SIDEBAR)
author:
  avatar: "DP1.jpeg"
  name: "Ritik Soni"
  pronouns: ""
  bio: "Institute Postdoctoral Fellow, IIT Kanpur"
  location: "Kanpur, Uttar Pradesh, India"
  employer: "IIT Kanpur"

  email: "ritiksoni2012@gmail.com"

  # Academic profiles
  googlescholar: "https://scholar.google.com/citations?user=-k58UbQAAAAJ&hl=en"
  orcid: "https://orcid.org/0009-0008-5305-7509"

  # Research / coding
  github: "ritik824"

  # Optional social links
  linkedin: "linkedin.com/in/ritik-soni-7a2922169"
  twitter: ""

  notes: "Alternate email: ritiks@iitk.ac.in"

# Publication categories
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"

# Site settings
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false

comments:
  provider: false

atom_feed:
  hide: false

# SEO
google_site_verification:
bing_site_verification:
alexa_site_verification:
yandex_site_verification:

# Analytics
analytics:
  provider: false

# Markdown + build settings (DO NOT TOUCH MUCH)
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock

keep_files:
  - .git

encoding: "utf-8"

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/

timezone: Etc/UTC

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jemoji

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
